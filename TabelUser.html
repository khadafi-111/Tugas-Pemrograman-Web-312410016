<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Tabel User</title>
  <style>
    body {
      font-family: Georgia, serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    h2 {
      margin-bottom: 20px;
      color: #333;
      font-size: 20px;
    }
    table {
      border-collapse: collapse;
      width: 900px;
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    th, td {
      border: 1px solid #ccc;
      padding: 14px 20px;
      text-align: center;
      vertical-align: middle;
    }
    th {
      background: #f0f0f0;
      font-weight: bold;
      font-size: 15px;
    }
    td {
      font-size: 14px;
      color: #333;
    }
    .photo-cell { width: 90px; }
    .photo-cell svg {
      width: 70px;
      height: 70px;
      display: block;
      margin: 0 auto;
      border-radius: 4px;
    }
    .keahlian-cell { text-align: left; }
    .keahlian-cell ul {
      margin: 0;
      padding-left: 18px;
    }
    .keahlian-cell ul li {
      margin-bottom: 3px;
    }
  </style>
</head>
